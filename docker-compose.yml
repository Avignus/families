version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: families-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: families
      POSTGRES_PASSWORD: families_secret
      POSTGRES_DB: families
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U families"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: families-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://families:families_secret@postgres:5432/families
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      STEAM_API_KEY: ${STEAM_API_KEY}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-BRL}
      DEFAULT_COUNTRY: ${DEFAULT_COUNTRY:-BR}
      NODE_ENV: production
    volumes:
      - ./.env:/app/.env:ro

volumes:
  postgres_data:
